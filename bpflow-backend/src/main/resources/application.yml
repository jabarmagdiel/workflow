spring:
  application:
    name: bpflow-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bpflow_db}
      database: ${SPRING_DATA_MONGODB_DATABASE:bpflow_db}
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@bpflow.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:BPFlow_JWT_Super_Secret_Key_2024_Change_In_Production_256bits!}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}        # 1 hour
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}  # 24 hours

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.bpflow: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

<div class="toast-container">
  <div *ngFor="let toast of notificationService.toasts()" [@toastAnimation]
       class="toast" [ngClass]="getBorderColor(toast.type)">
    
    <div class="text-2xl pt-1">
      {{ getIcon(toast.type) }}
    </div>
    
    <div class="flex-1">
      <h4 class="font-bold text-sm text-slate-100">{{ toast.title }}</h4>
      <p class="text-xs mt-1 text-slate-300 opacity-90 leading-relaxed">{{ toast.message }}</p>
    </div>

    <button class="toast-close text-slate-400" (click)="notificationService.markAsRead(toast.id)">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
  </div>
</div>

<!-- Sidebar Notification Panel (Overlay) -->
<div *ngIf="notificationService.showPanel()" 
     class="fixed inset-0 z-[60] flex justify-end"
     (click)="notificationService.togglePanel()">
  <div class="w-full max-w-sm h-full glass-panel border-l border-slate-800 shadow-2xl flex flex-col p-6 animate-slide-in"
       (click)="$event.stopPropagation()">
    
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-xl font-bold text-slate-100">Notifications</h2>
        <p class="text-xs text-slate-500">{{ notificationService.unreadCount() }} unread messages</p>
      </div>
      <button (click)="notificationService.togglePanel()" class="p-2 hover:bg-slate-800 rounded-full text-slate-400 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar space-y-4">
      <div *ngFor="let n of notificationService.notifications()" 
           class="p-4 rounded-xl border border-slate-800/50 hover:bg-slate-800/30 transition-all cursor-pointer group"
           [class.opacity-60]="n.read"
           (click)="notificationService.markAsRead(n.id)">
        <div class="flex gap-4">
          <div class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-800 text-xl">
            {{ getIcon(n.type) }}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start mb-1">
              <h4 class="text-sm font-semibold text-slate-200 truncate group-hover:text-blue-400 transition-colors">{{ n.title }}</h4>
              <span class="text-[10px] text-slate-500 whitespace-nowrap ml-2">{{ n.createdAt | date:'shortTime' }}</span>
            </div>
            <p class="text-xs text-slate-400 leading-relaxed">{{ n.message }}</p>
          </div>
        </div>
      </div>
      
      <div *ngIf="notificationService.notifications().length === 0" class="flex flex-col items-center justify-center py-20 text-slate-500">
        <svg class="w-12 h-12 opacity-20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <p class="text-sm">No notifications yet</p>
      </div>
    </div>

    <div class="pt-6 border-t border-slate-800/50 mt-auto">
      <button class="w-full py-2 text-xs text-slate-400 hover:text-blue-400 transition-colors font-medium">Clear All Notifications</button>
    </div>
  </div>
</div>
